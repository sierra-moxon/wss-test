name: wss-test
description: 'Schema for water sample measurements.

  Extends BERtron common data model types (Attribute, QuantityValue)

  with environmental measurement provenance and variable semantics.'
title: wss-test
see_also:
- https://sierra-moxon.github.io/wss-test
id: https://w3id.org/sierra-moxon/wss-test
imports:
- linkml:types
license: MIT
prefixes:
  wss_test:
    prefix_prefix: wss_test
    prefix_reference: https://w3id.org/sierra-moxon/wss-test/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  UO:
    prefix_prefix: UO
    prefix_reference: http://purl.obolibrary.org/obo/UO_
  ENVO:
    prefix_prefix: ENVO
    prefix_reference: http://purl.obolibrary.org/obo/ENVO_
  bertron:
    prefix_prefix: bertron
    prefix_reference: https://w3id.org/ber-data/bertron-schema/
  nmdc:
    prefix_prefix: nmdc
    prefix_reference: https://w3id.org/nmdc/
  qud:
    prefix_prefix: qud
    prefix_reference: http://qudt.org/1.1/schema/qudt#
default_prefix: wss_test
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
slots:
  id:
    name: id
    definition_uri: https://w3id.org/sierra-moxon/wss-test/id
    description: A unique identifier.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:id
    identifier: true
    owner: Attribute
    domain_of:
    - Dataset
    - Sample
    - Attribute
    range: string
    required: true
  name:
    name: name
    definition_uri: https://w3id.org/sierra-moxon/wss-test/name
    description: A human-readable name.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:name
    owner: Sample
    domain_of:
    - Dataset
    - Sample
    range: string
  description:
    name: description
    definition_uri: https://w3id.org/sierra-moxon/wss-test/description
    description: A free-text description.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:description
    owner: Dataset
    domain_of:
    - Dataset
    range: string
  label:
    name: label
    definition_uri: https://w3id.org/sierra-moxon/wss-test/label
    description: Text string to describe the attribute.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    aliases:
    - title
    slot_uri: wss_test:label
    owner: Attribute
    domain_of:
    - Attribute
    range: string
    required: true
  site_code:
    name: site_code
    definition_uri: https://w3id.org/sierra-moxon/wss-test/site_code
    description: Code identifying the sampling site (e.g. CM_003, CM_004).
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:site_code
    owner: Sample
    domain_of:
    - Sample
    range: string
  medium:
    name: medium
    definition_uri: https://w3id.org/sierra-moxon/wss-test/medium
    description: The environmental medium or matrix sampled (e.g. OCN for ocean water).
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:medium
    owner: Sample
    domain_of:
    - Sample
    range: string
  replicate:
    name: replicate
    definition_uri: https://w3id.org/sierra-moxon/wss-test/replicate
    description: Replicate number within a site and medium.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:replicate
    owner: Sample
    domain_of:
    - Sample
    range: integer
  variables:
    name: variables
    definition_uri: https://w3id.org/sierra-moxon/wss-test/variables
    description: Variable definitions used by measurements in this dataset.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:variables
    owner: Dataset
    domain_of:
    - Dataset
    range: Variable
    multivalued: true
    inlined: true
    inlined_as_list: true
  samples:
    name: samples
    definition_uri: https://w3id.org/sierra-moxon/wss-test/samples
    description: The samples included in this dataset.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:samples
    owner: Dataset
    domain_of:
    - Dataset
    range: Sample
    multivalued: true
    inlined: true
    inlined_as_list: true
  measurements:
    name: measurements
    definition_uri: https://w3id.org/sierra-moxon/wss-test/measurements
    description: The measurements performed on this sample.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:measurements
    owner: Sample
    domain_of:
    - Sample
    range: Measurement
    multivalued: true
    inlined: true
    inlined_as_list: true
  attribute:
    name: attribute
    definition_uri: https://w3id.org/sierra-moxon/wss-test/attribute
    description: The attribute being represented.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - bertron:attribute
    slot_uri: wss_test:attribute
    owner: AttributeValue
    domain_of:
    - AttributeValue
    range: Attribute
    required: true
  raw_value:
    name: raw_value
    definition_uri: https://w3id.org/sierra-moxon/wss-test/raw_value
    description: The value that was specified for an annotation in raw form, i.e.
      a string. E.g. "2 cm" or "2-4 cm"
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - nmdc:raw_value
    - bertron:raw_value
    slot_uri: wss_test:raw_value
    owner: AttributeValue
    domain_of:
    - AttributeValue
    range: string
  numeric_value:
    name: numeric_value
    definition_uri: https://w3id.org/sierra-moxon/wss-test/numeric_value
    description: The numerical part of a quantity value.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    aliases:
    - result_value
    mappings:
    - nmdc:numeric_value
    - qud:quantityValue
    - schema:value
    - bertron:numeric_value
    slot_uri: wss_test:numeric_value
    owner: QuantityValue
    domain_of:
    - QuantityValue
    range: float
  unit:
    name: unit
    definition_uri: https://w3id.org/sierra-moxon/wss-test/unit
    description: Unit of measurement, ideally as a Unit Ontology CURIE.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - nmdc:unit
    - qud:unit
    - schema:unitCode
    - UO:0000000
    - bertron:unit
    slot_uri: wss_test:unit
    owner: QuantityValue
    domain_of:
    - QuantityValue
    range: string
  unit_cv_id:
    name: unit_cv_id
    definition_uri: https://w3id.org/sierra-moxon/wss-test/unit_cv_id
    description: The unit of the quantity, expressed as a CURIE from the Unit Ontology.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - bertron:unit_cv_id
    slot_uri: wss_test:unit_cv_id
    owner: QuantityValue
    domain_of:
    - QuantityValue
    range: curie
  value:
    name: value
    definition_uri: https://w3id.org/sierra-moxon/wss-test/value
    description: The value, as a text string.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - bertron:value
    slot_uri: wss_test:value
    owner: TextValue
    domain_of:
    - TextValue
    range: string
  value_cv_id:
    name: value_cv_id
    definition_uri: https://w3id.org/sierra-moxon/wss-test/value_cv_id
    description: For values that are in a controlled vocabulary (CV), this attribute
      should capture the controlled vocabulary ID for the value.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - bertron:value_cv_id
    slot_uri: wss_test:value_cv_id
    owner: TextValue
    domain_of:
    - TextValue
    range: curie
  expression_basis:
    name: expression_basis
    definition_uri: https://w3id.org/sierra-moxon/wss-test/expression_basis
    description: The chemical expression basis (e.g. as dissolved carbon).
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:expression_basis
    owner: Variable
    domain_of:
    - Variable
    range: string
  default_unit:
    name: default_unit
    definition_uri: https://w3id.org/sierra-moxon/wss-test/default_unit
    description: Default unit for this variable, ideally as a Unit Ontology CURIE.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:default_unit
    owner: Variable
    domain_of:
    - Variable
    range: string
  missing_value_code:
    name: missing_value_code
    definition_uri: https://w3id.org/sierra-moxon/wss-test/missing_value_code
    description: The sentinel value used to represent missing data for this variable.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:missing_value_code
    owner: Variable
    domain_of:
    - Variable
    range: integer
  method_id:
    name: method_id
    definition_uri: https://w3id.org/sierra-moxon/wss-test/method_id
    description: Identifier for the analytical method used to produce the measurement.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:method_id
    owner: Measurement
    domain_of:
    - Measurement
    range: string
  flag:
    name: flag
    definition_uri: https://w3id.org/sierra-moxon/wss-test/flag
    description: Quality assurance flag associated with the measurement.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:flag
    owner: Measurement
    domain_of:
    - Measurement
    range: string
  datetime_measured:
    name: datetime_measured
    definition_uri: https://w3id.org/sierra-moxon/wss-test/datetime_measured
    description: Date and time when the measurement was taken.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:datetime_measured
    owner: Measurement
    domain_of:
    - Measurement
    range: datetime
  statistic:
    name: statistic
    definition_uri: https://w3id.org/sierra-moxon/wss-test/statistic
    description: The summary statistic applied to the measurement, if any (e.g. mean,
      median).
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:statistic
    owner: Measurement
    domain_of:
    - Measurement
    range: string
  temporal_aggregation:
    name: temporal_aggregation
    definition_uri: https://w3id.org/sierra-moxon/wss-test/temporal_aggregation
    description: The time interval over which the statistic was aggregated (e.g. daily,
      15-min).
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:temporal_aggregation
    owner: Measurement
    domain_of:
    - Measurement
    range: string
  reported_precision:
    name: reported_precision
    definition_uri: https://w3id.org/sierra-moxon/wss-test/reported_precision
    description: The precision of the reported result value.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:reported_precision
    owner: Measurement
    domain_of:
    - Measurement
    range: float
  notes:
    name: notes
    definition_uri: https://w3id.org/sierra-moxon/wss-test/notes
    description: Free-text notes about the measurement.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    slot_uri: wss_test:notes
    owner: Measurement
    domain_of:
    - Measurement
    range: string
  Variable_id:
    name: Variable_id
    definition_uri: https://w3id.org/sierra-moxon/wss-test/id
    description: Canonical identifier for this variable (e.g. carbon_dissolved_organic).
    from_schema: https://w3id.org/sierra-moxon/wss-test
    is_a: id
    domain: Variable
    slot_uri: wss_test:id
    identifier: true
    alias: id
    owner: Variable
    domain_of:
    - Variable
    is_usage_slot: true
    usage_slot_name: id
    range: string
    required: true
  Measurement_attribute:
    name: Measurement_attribute
    definition_uri: https://w3id.org/sierra-moxon/wss-test/attribute
    description: The variable being measured, as a reference to a Variable definition.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - bertron:attribute
    is_a: attribute
    domain: Measurement
    slot_uri: wss_test:attribute
    alias: attribute
    owner: Measurement
    domain_of:
    - Measurement
    is_usage_slot: true
    usage_slot_name: attribute
    range: Variable
    required: true
  Measurement_numeric_value:
    name: Measurement_numeric_value
    definition_uri: https://w3id.org/sierra-moxon/wss-test/numeric_value
    description: The numerical part of a quantity value.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    aliases:
    - result_value
    mappings:
    - nmdc:numeric_value
    - qud:quantityValue
    - schema:value
    - bertron:numeric_value
    is_a: numeric_value
    domain: Measurement
    slot_uri: wss_test:numeric_value
    alias: numeric_value
    owner: Measurement
    domain_of:
    - Measurement
    is_usage_slot: true
    usage_slot_name: numeric_value
    range: float
    required: true
  Measurement_unit:
    name: Measurement_unit
    definition_uri: https://w3id.org/sierra-moxon/wss-test/unit
    description: Unit of measurement, ideally as a Unit Ontology CURIE.
    from_schema: https://w3id.org/sierra-moxon/wss-test
    mappings:
    - nmdc:unit
    - qud:unit
    - schema:unitCode
    - UO:0000000
    - bertron:unit
    is_a: unit
    domain: Measurement
    slot_uri: wss_test:unit
    alias: unit
    owner: Measurement
    domain_of:
    - Measurement
    is_usage_slot: true
    usage_slot_name: unit
    range: string
    required: true
classes:
  Dataset:
    name: Dataset
