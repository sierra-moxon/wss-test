  name: Test WIF Misconfiguration                                                                                                                  
                                                                                                                                                   
  on:                                                                                                                                              
    workflow_dispatch:                                                                                                                             
                                                                                                                                                   
  jobs:                                                                                                                                            
    test_auth:                                                                                                                                     
      name: 'Test OIDC Auth'                                                                                                                       
      runs-on: ubuntu-latest                                                                                                                       
      permissions:                                                                                                                                 
        contents: read                                                                                                                             
        id-token: write                                                                                                                            
                                                                                                                                                   
      steps:                                                                                                                                       
        - id: 'auth'                                                                                                                               
          name: 'Authenticate to Google Cloud'                                                                                                     
          uses: 'google-github-actions/auth@v2'                                                                                                    
          with:                                                                                                                                    
            workload_identity_provider:                                                                                                            
  'projects/1032453560151/locations/global/workloadIdentityPools/monarch-github-actions/providers/monarch-github-wip'                              
            service_account: 'github-actions@monarch-initiative.iam.gserviceaccount.com'                                                           
                                                                                                                                                   
        - name: 'Set up gcloud'                                                                                                                    
          uses: 'google-github-actions/setup-gcloud@v2'                                                                                            
                                                                                                                                                   
        - name: 'Test access'                                                                                                                      
          run: |                                                                                                                                   
            echo "Auth succeeded - WIF provider lacks sufficient conditions"                                                                       
            gcloud auth list                                                                                                                       
            gcloud projects list
